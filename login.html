<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in | NextPulse</title>
  <meta name="description" content="Sign in to NextPulse ERP.">
  <link rel="icon" type="image/png" href="assets/logo/nextpulse-icon.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/theme.css?v=20260719-2" rel="stylesheet">
  <link href="css/components.css?v=20260721-7" rel="stylesheet">
  <link href="css/auth.css?v=20260721-7" rel="stylesheet">
</head>
<body>
  <main class="np-auth-page">
    <section class="np-auth-brand">
      <img class="np-auth-logo" src="assets/logo/nextpulse-transparent.png" alt="NextPulse">
      <div>
        <p class="np-kicker">Factory ERP</p>
        <h1>Know the Pulse of Your Factory</h1>
        <p>
          Sign in to manage inventory, receiving, transfers, and production from one calm workspace.
        </p>
      </div>
    </section>

    <section class="np-auth-card" aria-label="Sign in">
      <div class="np-auth-card-inner">
        <div class="np-auth-card-header">
          <p class="np-kicker">Welcome back</p>
          <h2>Sign in to your account</h2>
        </div>

        <form id="loginForm" novalidate>
          <div class="np-form-field">
            <label for="email">Email</label>
            <input class="form-control" type="email" id="email" name="email" autocomplete="email" required>
          </div>

          <div class="np-form-field">
            <label for="password">Password</label>
            <input class="form-control" type="password" id="password" name="password" autocomplete="current-password" required>
          </div>

          <div class="np-login-error" id="loginError" hidden></div>

          <button class="np-primary-button" type="submit" id="loginButton">
            <span>Sign in</span>
            <i class="bi bi-arrow-right"></i>
          </button>
        </form>
      </div>
      <div class="np-auth-footer">
        NextPulse keeps sessions in a secure HttpOnly cookie.
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js?v=20260719-2"></script>
  <script src="js/login.js?v=20260719-2"></script>
</body>
</html>
