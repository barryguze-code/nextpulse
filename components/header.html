<header class="np-header">
  <div class="np-header-left">
    <button class="np-icon-button d-lg-none" type="button" data-sidebar-toggle aria-label="Open navigation">
      <i class="bi bi-list"></i>
    </button>
    <label class="np-global-search" aria-label="Search">
      <i class="bi bi-search"></i>
      <input type="search" placeholder="Search">
    </label>
    <div class="np-header-title">
      <p class="np-kicker mb-1">Workspace</p>
      <h2 id="pageTitle">Home</h2>
    </div>
  </div>

  <div class="np-header-actions">
    <button class="np-icon-button" type="button" aria-label="Notifications">
      <i class="bi bi-bell"></i>
    </button>
    <button class="np-user-button" type="button" aria-label="User menu">
      <span class="np-user-avatar" id="userAvatar">U</span>
      <span class="np-user-meta d-none d-sm-grid">
        <strong id="userDisplayName">User</strong>
        <small id="userRole">Role</small>
      </span>
    </button>
    <button class="np-icon-button" type="button" id="logoutButton" aria-label="Sign out">
      <i class="bi bi-box-arrow-right"></i>
    </button>
  </div>
</header>
